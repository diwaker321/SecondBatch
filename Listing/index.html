<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list in html</title>
    <style>
      /* ul{
            list-style-type: none;
        } */
         .nestedClass{
            list-style-type: none;
         }
    </style>
  </head>
  <body>
    <ul >
        <li>html</li>
        <li>css</li>
        <li>javascript</li>
        <li>bootstrap</li>
        <li>tailwin</li>
        <li>github</li>
        <li>frontend
            <ul class="nestedClass">
                <li>react</li>
            </ul>
        </li>

        <li>backend
            <ul class="nestedClass">
                <li>node js </li>
                <li>express js</li>
            </ul>
        </li>

        <li>database
            <ul class="nestedClass">
                <li>mongoDB</li>
            </ul>
        </li>
    </ul>

    <ol start="10" type="1">
      <li>html</li>
      <li>css</li>
      <li>javascript</li>
      <li>javascript</li>
    </ol>
