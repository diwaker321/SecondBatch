<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>block and inline</title>
    <style>
        p{
            border: 1px solid black;
            display: inline;

        }
        span{
            border: 1px solid black;
            display: block;
        }
        h1{
            border: 1px solid black;
            display: inline;
            
        }
    </style>
</head>
<body>
    <h1>hello h1</h1>
    <p>hello world para</p>
    <span>hello span</span>

</body>
</html>
