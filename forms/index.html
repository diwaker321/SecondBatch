    <form autocomplete="off">
      <fieldset>
        <legend>Personal Information</legend>
        <!-- <input type="text" placeholder="Your Name" class="nameInput"> -->
        <label for="Username">Enter Your Name:</label>
        <input
          name="Username"
          id="Username"
          type="text"
          placeholder="Your Name"
          class="nameInput"
        />
        <!-- <input type="text" id="" /> -->

        <br /><br />

        <label for="useremail">Enter Your Email Address:</label>
        <input
          name="UserEmail"
          id="useremail"
          type="email"
          placeholder=" Your Email"
          class="nameInput"
        />

        <br />
        <br />

        <label for="UserCourse">Enter Your Course:</label>
        <input
          name="UserCourse"
          id="UserCourse"
          type="text"
          placeholder="Your Course"
          class="nameInput"
        />

        <br />
        <br />

        <textarea
          name="UserMessage"
          id=""
          rows="6"
          cols="40"
          placeholder="Enter your message"
        ></textarea>
        <br /><br />

        <input type="submit" value="Submit Now" />
      </fieldset>

      <hr />
      <fieldset>
        <legend>Second class of form</legend>
        <!-- <p>Class second of form</p> -->

        <!-- <label for="">Select your gender:</label> -->

        <input type="radio" id="male" name="Gender" />

        <label for="female">Female</label>

        <input type="radio" id="others" name="Gender" />
        <label for="others">Others</label>

        <br />
        <br />

        <br />
        <br />

          <option value="blue">Blue</option>
          <option value="orange">Orange</option>
          <option value="yellow">Yellow</option>
          <option value="red">Red</option>
