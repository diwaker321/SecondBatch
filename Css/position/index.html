<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .maincont {
        display: flex;
        padding: 10px;
        gap: 20px;
        border: 1px solid black;
        justify-content: center;
      }

      .div{
        width: 200px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        /* color: white; */
      }
      .one{
        background-color: red;
      }
      .two{
        background-color: greenyellow;
      }
      .three{
        color: white;
        background-color: blue;
      }
      .four{
        background-color: aquamarine;
      }
    </style>
  </head>
  <body>
    <div class="maincont">
      <div class="div one">one</div>
      <div class="div two">two</div>
      <div class="div three">three</div>
      <div class="div four">four</div>
    </div>
  </body>
</html>
