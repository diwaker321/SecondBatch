<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadows in css</title>
    <style>
      div {
        width: 200px;
        height: 150px;
        /* border: 1px solid black; */
        border-radius: 10px;
        /* box-shadow: 10px ; */
        box-shadow:
          rgba(0, 0, 0, 0.19) 0px 10px 20px,
          rgba(0, 0, 0, 0.23) 0px 6px 6px;
      }

      p {
        font-size: 30px;
        text-shadow:
          1px 1px 10px red,
          1px 2px 20px blue;
      }
    </style>
  </head>
  <body>
    <div></div>

    <p>Text Shadow</p>
  </body>
</html>
